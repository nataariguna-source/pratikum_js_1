<!DOCTYPE html> 
<html lang="id"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Praktikum 1 - JS Dasar PNB</title> 
<link rel="stylesheet" href="style.css"> 
</head> 
<body> 
<div class="card"> 
<h2>Kalkulator Pajak Toko</h2> 
<p>Input data barang untuk menghitung total bayar.</p> 
<div class="form-group"> 
<label>Nama Barang:</label> 
<input type="text" id="namaBarang" placeholder="Masukkan nama barang..."> 
</div> 
<div class="form-group"> 
<label>Harga Satuan (Rp):</label> 
<input type="number" id="hargaBarang" placeholder="0"> 
</div> 
<div class="form-group"> 
<label>Jumlah Beli:</label> 
<input type="number" id="jumlahBeli" placeholder="0"> 
</div> 
<button id="btnHitung">Hitung Sekarang</button> 
<button id="btnReset">Reset</button>
<div id="hasil"> 
<p id="labelHasil">Hasil perhitungan akan muncul di sini.</p> 
</div> 
</div> 
<script src="app.js"></script> 
</body> 
</html>
